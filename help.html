<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Home Systems technical help desk — MEP design and BIM support requests.">
    <title>Help Desk | homesystems.io</title>
    <link rel="stylesheet" href="css/forms.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript" src="js/emailjs-corporate-config.js"></script>
    <script type="text/javascript">
    (function(){
        if (window.emailjsConfig && typeof emailjs !== 'undefined') {
            emailjs.init(window.emailjsConfig.publicKey);
        }
    })();
    </script>
</head>
<body class="form-page form-page--dark">

<header class="form-header">
    <a href="index.html" class="form-logo">home systems<span>.io</span></a>
    <nav class="form-nav" aria-label="Main">
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
        <a href="ai-support.html">AI Support</a>
    </nav>
</header>

<main class="form-main">
    <div class="form-card">
        <h1>Help Desk</h1>
        <p class="intro">Submit a technical support request for MEP design, BIM drafting, or project coordination.</p>

        <form id="corporateContactForm" class="lead-form">
            <label for="help-name">Full name</label>
            <input type="text" id="help-name" name="name" required autocomplete="name">

            <label for="help-phone">Mobile number</label>
            <input type="tel" id="help-phone" name="phone" required autocomplete="tel" placeholder="10-digit mobile">

            <label for="help-email">Email</label>
            <input type="email" id="help-email" name="email" required autocomplete="email">

            <label for="help-topic">Topic</label>
            <select id="help-topic" name="type" required>
                <option value="MEP Design Support">MEP Design Support</option>
                <option value="BIM / Revit Issue">BIM / Revit Issue</option>
                <option value="Shop Drawing Query">Shop Drawing Query</option>
                <option value="Site / Execution">Site / Execution</option>
                <option value="Other Technical">Other Technical</option>
            </select>

            <label for="help-message">Describe your issue</label>
            <textarea id="help-message" name="message" rows="5" required placeholder="Project name, drawing reference, error details…"></textarea>

            <button type="submit" class="btn-submit" id="submitFormBtn">Submit Details</button>
            <div id="submissionStatusDisplay" style="margin-top: 15px; padding: 12px; font-weight: bold; border-radius: 4px; display: none; text-align: center; font-family: sans-serif;"></div>
        </form>

        <p class="intro" style="margin-top: 20px; margin-bottom: 0; font-size: 0.85rem;">
            Official inbox: info@homesystems-io.com · +91 9467584013
        </p>
    </div>
</main>

<a href="ai-support.html" class="ai-fab" title="AI Support" aria-label="AI Support">🤖</a>

<script type="text/javascript" src="js/corporate-emailjs.js"></script>
</body>
</html>

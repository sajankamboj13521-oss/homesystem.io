<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Support | homesystems.io</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript" src="js/emailjs-corporate-config.js"></script>
    <script type="text/javascript">
    (function(){
        if (window.emailjsConfig && typeof emailjs !== 'undefined') {
            emailjs.init(window.emailjsConfig.publicKey);
        }
    })();
    </script>
    <style>
        :root {
            --primary: #00d4ff;
            --dark-bg: #0a0b10;
            --glass: rgba(255, 255, 255, 0.08);
            --neon: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            color: white;
        }

        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            pointer-events: none;
            z-index: -1;
            text-transform: uppercase;
        }

        header {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .logo-box { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .logo-text { font-size: clamp(1.1rem, 4vw, 1.5rem); font-weight: bold; color: white; }
        .orange-box { background: #ff8c00; color: white; padding: 2px 6px; border-radius: 4px; }

        nav { display: flex; flex-wrap: wrap; gap: 12px 20px; }
        nav a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        nav a:hover { color: var(--primary); text-shadow: var(--neon); }

        .chat-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }

        .chat-card {
            width: 100%;
            max-width: 550px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            height: min(75vh, calc(100dvh - 120px));
            min-height: 420px;
            position: relative;
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            max-width: 88%;
            animation: slideIn 0.3s ease-out;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot {
            background: rgba(255, 255, 255, 0.1);
            color: #eee;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user {
            background: linear-gradient(135deg, #0078d7, #00d4ff);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: var(--neon);
        }

        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; align-self: flex-start; max-width: 100%; }

        .opt-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.3s;
        }

        .opt-btn:hover { background: var(--primary); color: #000; box-shadow: var(--neon); }

        .input-area {
            padding: 16px;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            flex: 1;
            min-width: 0;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            outline: none;
            font-size: 16px;
        }

        input:focus { border-color: var(--primary); box-shadow: var(--neon); }

        .send-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 14px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }

        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #success-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            padding: 24px;
        }

        .tick { font-size: 64px; color: #00ff88; text-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }

        #success-status {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            line-height: 1.6;
            max-width: 320px;
            margin: 12px 0 20px;
        }

        .wa-resend {
            display: none;
            color: #25d366;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid #25d366;
            padding: 10px 20px;
            border-radius: 50px;
        }

        .wa-resend:hover { background: rgba(37, 211, 102, 0.15); }

        @media (max-width: 480px) {
            .chat-card { border-radius: 18px; height: min(82vh, calc(100dvh - 100px)); }
            nav a { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="bg-watermark">home systems.io</div>

<header>
    <a href="index.html" class="logo-box">
        <span class="logo-text">home systems<span class="orange-box">io</span></span>
    </a>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div class="chat-wrapper">
    <div class="chat-card" id="main-card">
        <div id="chat-box">
            <div class="msg bot">Welcome to the Home Systems AI Support Desk. I will tailor this conversation to your needs — please select your profile:</div>
            <div class="btn-group" id="opts">
                <button type="button" class="opt-btn" data-role="client">Client / Customer</button>
                <button type="button" class="opt-btn" data-role="job_seeker">Job Seeker</button>
                <button type="button" class="opt-btn" data-role="vendor">Vendor / Partner</button>
            </div>
        </div>

        <div id="success-screen">
            <div class="tick">✔</div>
            <h2 style="color: white; margin: 10px 0;">Submission Successful</h2>
            <p id="success-status">Thank you! Your details have been submitted successfully.</p>
        </div>

        <div class="input-area" id="in-bar" style="display: none;">
            <input type="text" id="user-in" placeholder="Type your answer…" autocomplete="off">
            <button type="button" class="send-btn" id="send-btn">Send</button>
        </div>

        <form id="corporateContactForm" style="display: none;" aria-hidden="true">
            <input type="text" name="name" id="ai-form-name">
            <input type="email" name="email" id="ai-form-email">
            <input type="tel" name="phone" id="ai-form-phone">
            <textarea name="message" id="ai-form-message"></textarea>
            <button type="submit" id="submitFormBtn">Submit</button>
        </form>
        <div id="submissionStatusDisplay" style="margin: 15px 20px 0; padding: 12px; font-weight: bold; border-radius: 4px; display: none; text-align: center; font-family: sans-serif;"></div>
    </div>
</div>

<script type="text/javascript" src="js/corporate-emailjs.js"></script>
<script type="text/javascript" src="js/chat-lead.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Support | homesystems.io</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { 
            --primary: #00d4ff; 
            --dark-bg: #0a0b10; 
            --glass: rgba(255, 255, 255, 0.08); 
            --neon: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--dark-bg);
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
            color: white;
        }

        /* Branding Watermark Background */
        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 8rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            pointer-events: none;
            z-index: -1;
            text-transform: uppercase;
        }

        /* Professional Header */
        header { 
            background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(20px);
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        .logo-box { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .logo-text { font-size: 1.5rem; font-weight: bold; color: white; }
        .orange-box { background: #ff8c00; color: white; padding: 2px 6px; border-radius: 4px; }
        nav a { text-decoration: none; color: rgba(255,255,255,0.8); margin-left: 20px; font-weight: 500; font-size: 0.9rem; transition: 0.3s; }
        nav a:hover { color: var(--primary); text-shadow: var(--neon); }

        .chat-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Crazy Neon Chat Card */
        .chat-card { 
            width: 100%; 
            max-width: 550px; 
            background: var(--glass); 
            backdrop-filter: blur(25px);
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05); 
            display: flex; 
            flex-direction: column; 
            height: 75vh; 
            position: relative;
        }

        #chat-box { 
            flex: 1; 
            padding: 25px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* Message Bubbles */
        .msg { 
            padding: 14px 20px; 
            border-radius: 20px; 
            font-size: 14px; 
            line-height: 1.5;
            max-width: 85%;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot { 
            background: rgba(255, 255, 255, 0.1); 
            color: #eee;
            align-self: flex-start; 
            border-bottom-left-radius: 4px;
        }
        .user { 
            background: linear-gradient(135deg, #0078d7, #00d4ff); 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 4px;
            box-shadow: var(--neon);
        }

        /* Options Area */
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; }
        .opt-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .opt-btn:hover { background: var(--primary); color: #000; box-shadow: var(--neon); }

        /* Input Section */
        .input-area { 
            padding: 20px; 
            display: flex; 
            gap: 12px; 
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        input { 
            flex: 1; 
            padding: 14px; 
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; 
            color: white;
            outline: none; 
        }
        input:focus { border-color: var(--primary); box-shadow: var(--neon); }
        .send-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 0 25px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Success screen */
        #success-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }
        .tick { font-size: 80px; color: #00ff88; text-shadow: 0 0 20px rgba(0,255,136,0.4); }
    </style>
</head>
<body>

<div class="bg-watermark">home systems.io</div>

<header>
    <a href="index.html" class="logo-box">
        <span class="logo-text">home systems<span class="orange-box">io</span></span>
    </a>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div class="chat-wrapper">
    <div class="chat-card" id="main-card">
        <div id="chat-box">
            <div class="msg bot">Welcome to the AI Support Desk. Please choose your profile:</div>
            <div class="btn-group" id="opts">
                <button class="opt-btn" onclick="start('Client')">Client</button>
                <button class="opt-btn" onclick="start('Vendor')">Vendor</button>
                <button class="opt-btn" onclick="start('Job Seeker')">Job Seeker</button>
            </div>
        </div>

        <div id="success-screen">
            <div class="tick">✔</div>
            <h2 style="color: white; margin: 10px 0;">Submission Successful</h2>
            <p style="color: rgba(255,255,255,0.6);">Your details have been secured. Closing chat...</p>
        </div>

        <div class="input-area" id="in-bar" style="display: none;">
            <input type="text" id="user-in" placeholder="Type your answer...">
            <button class="send-btn" onclick="next()">Send</button>
        </div>
    </div>
</div>

<script>
    emailjs.init("YOUR_PUBLIC_KEY"); 

    let step = 0;
    let type = "";
    let logs = "";
    let qs = [];

    function start(t) {
        type = t;
        document.getElementById('opts').style.display = 'none';
        document.getElementById('in-bar').style.display = 'flex';
        add("I am a " + t, "user");
        
        if(t==='Client') qs = ["Project Type?", "Estimated Budget?", "Preferred Deadline?"];
        else if(t==='Vendor') qs = ["Services Offered?", "Experience Level?", "Company Name?"];
        else qs = ["Designation?", "Expertise?", "Current Location?"];
        
        setTimeout(() => add("Perfect. " + qs[0], "bot"), 600);
    }

    function add(txt, cls) {
        const b = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = `msg ${cls}`;
        d.innerText = txt;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
        logs += (cls === 'bot' ? "AI: " : "User: ") + txt + "\n";
    }

    function next() {
        const inp = document.getElementById('user-in');
        if(!inp.value) return;
        add(inp.value, "user");
        inp.value = "";
        step++;
        
        if(step < qs.length) {
            setTimeout(() => add(qs[step], "bot"), 600);
        } else {
            setTimeout(() => add("Final step: Enter your Phone/Email to submit.", "bot"), 600);
            document.querySelector(".send-btn").onclick = finish;
        }
    }

    function finish() {
        const contact = document.getElementById('user-in').value;
        if(!contact) return;
        logs += "Contact Info: " + contact;
        
        document.getElementById('chat-box').style.display = 'none';
        document.getElementById('in-bar').style.display = 'none';
        document.getElementById('success-screen').style.display = 'flex';

        emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
            message: logs,
            reply_to: contact
        }).then(() => {
            setTimeout(() => { window.location.href = "index.html"; }, 3000);
        });
    }
</script>

</body>
</html>
